<!DOCTYPE html>
<html>
<head>
<title>Student Database</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family: Arial;
background:#f2f6f5;
text-align:center;
margin:0;
}

.container{
max-width:900px;
margin:auto;
padding:30px;
}

h1{
color:#1b5e20;
}

input{
padding:10px;
margin:10px;
width:250px;
}

button{
padding:10px 20px;
margin:10px;
background:#2e7d32;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:15px;
}

button:hover{
background:#1b5e20;
}

.student-card{
margin-top:30px;
padding:20px;
background:white;
border-radius:10px;
box-shadow:0 5px 10px rgba(0,0,0,0.15);
}

.hidden{
display:none;
}

.home-btn{
position:absolute;
top:20px;
left:20px;
background:#ffffffcc;
color:#1b5e20;
font-weight:bold;
}

.student-photo{
width:120px;
height:120px;
border-radius:100%;
object-fit:cover;
margin-top:10px;
}

</style>
</head>

<body>

<a href="index.html">
<button class="home-btn">⬅ Go Back Home</button>
</a>

<div class="container">

<h1>Student Database</h1>

<button onclick="showAdd()">➕ Add Student</button>
<button onclick="showView()">📋 Show Student</button>

<!-- ADD / EDIT SECTION -->

<div id="addSection" class="hidden">

<h3>Add / Edit Student</h3>

<input id="name" placeholder="Student Name"><br>
<input id="roll" placeholder="Roll Number"><br>
<input id="program" placeholder="Program"><br>
<input id="email" placeholder="Email"><br>

<input type="file" id="photo" accept="image/*"><br>

<img id="preview" class="student-photo hidden">

<br>

<button onclick="saveStudent()">Save Student</button>

</div>


<!-- VIEW SECTION -->

<div id="viewSection" class="hidden">

<h3>Select Student</h3>

<select id="studentList" onchange="showStudent()">
<option value="">Select Student</option>
</select>

<div class="student-card" id="studentDetails">
Student details will appear here
</div>

</div>

</div>

<script>

let students = JSON.parse(localStorage.getItem("students")) || [];
let editIndex = null;
let photoData = "";

document.getElementById("photo").addEventListener("change",function(){

let file=this.files[0];

if(!file) return;

let reader=new FileReader();

reader.onload=function(e){

photoData=e.target.result;

let preview=document.getElementById("preview");

preview.src=photoData;
preview.classList.remove("hidden");

};

reader.readAsDataURL(file);

});

function showAdd(){

document.getElementById("addSection").classList.remove("hidden");
document.getElementById("viewSection").classList.add("hidden");

clearForm();

}

function showView(){

document.getElementById("viewSection").classList.remove("hidden");
document.getElementById("addSection").classList.add("hidden");

loadStudents();

}

function saveStudent(){

let name=document.getElementById("name").value;
let roll=document.getElementById("roll").value;
let program=document.getElementById("program").value;
let email=document.getElementById("email").value;

let student={
name:name,
roll:roll,
program:program,
email:email,
photo:photoData
};

if(editIndex===null){

students.push(student);

}else{

students[editIndex]=student;

editIndex=null;

}

localStorage.setItem("students",JSON.stringify(students));

alert("Student Saved");

clearForm();

loadStudents();

}

function loadStudents(){

let list=document.getElementById("studentList");

list.innerHTML='<option value="">Select Student</option>';

students.forEach((s,index)=>{

let option=document.createElement("option");

option.value=index;
option.text=s.name+" ("+s.roll+")";

list.appendChild(option);

});

}

function showStudent(){

let index=document.getElementById("studentList").value;

if(index==="") return;

let s=students[index];

document.getElementById("studentDetails").innerHTML=

'<img src="'+s.photo+'" class="student-photo">'+
"<h3>"+s.name+"</h3>"+
"<p><b>Roll:</b> "+s.roll+"</p>"+
"<p><b>Program:</b> "+s.program+"</p>"+
"<p><b>Email:</b> "+s.email+"</p>"+
'<button onclick="editStudent('+index+')">Edit</button>'+
'<button onclick="deleteStudent('+index+')">Delete</button>';

}

function editStudent(index){

let s=students[index];

showAdd();

document.getElementById("name").value=s.name;
document.getElementById("roll").value=s.roll;
document.getElementById("program").value=s.program;
document.getElementById("email").value=s.email;

photoData=s.photo;

let preview=document.getElementById("preview");

preview.src=s.photo;
preview.classList.remove("hidden");

editIndex=index;

}

function deleteStudent(index){

if(!confirm("Delete this student?")) return;

students.splice(index,1);

localStorage.setItem("students",JSON.stringify(students));

loadStudents();

document.getElementById("studentDetails").innerHTML="Student deleted";

}

function clearForm(){

document.getElementById("name").value="";
document.getElementById("roll").value="";
document.getElementById("program").value="";
document.getElementById("email").value="";
document.getElementById("photo").value="";

photoData="";

document.getElementById("preview").classList.add("hidden");

}

</script>

</body>
</html>
